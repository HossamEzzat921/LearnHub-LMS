<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnHub Test</title>
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body class="bg-gray-900">
    <!-- class="bg-red-500 text-white flex justify-center items-center h-screen" -->
    <!-- <h1 class="text-4xl font-bold text-blue-400">
        مبروك! Tailwind شغال تمام 🚀
    </h1> -->
    <div class="container bg-white rounded-2xl max-w-md justify-center">
      <div class="upload-assignment-form">
        <h2>Upload Assignment</h2>
        <button>close</button>
        <form>
          <div class="form-group">
            <label for="assignment-title">Assignment Title</label>
            <input type="text" id="assignment-title" name="assignment-title" placeholder="Enter assignment title"/>
          </div>
          <div>
            <label for="assignment-description">Description</label>
            <textarea id="assignment-description" name="assignment-description" placeholder="Descibe the assignment..."></textarea>
          </div>
          <div class="form-group ">
            <label for="assignment-file">Assignment PDF</label>
            <input type="file" id="assignment-file" name="assignment-file" />
          </div>
            <button type="submit">Publish</button>
            <button type="reset">Cancel</button>
        </form>

      </div>
    </div>
  </body>
</html>
