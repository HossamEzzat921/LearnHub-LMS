<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Assignment Modal - LearnHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <style>
        @theme {
   
            --color-dark: #1f242e;
            --color-gray: #6b7280;
            --color-white: #ffffff;
            --color-cream: #f9fafb;
            --color-light-gray: #e5e7eb;
            --color-teal: #2d9588;
            --color-teal-light: #5abbb1; 
            --font-inter: "Inter", sans-serif;
        }

        body {
            font-family: var(--font-inter);
            background-color: var(--color-dark); /* simulate dark bg */
        }
    </style>
</head>
<body class="antialiased h-screen flex items-center justify-center bg-gray-900/50 backdrop-blur-sm p-4">

    <div class="bg-white w-full max-w-[550px] rounded-2xl shadow-2xl overflow-hidden transform transition-all relative animate-fade-in-up">
        
        <div class="flex justify-between items-center px-6 py-5">
            <h2 class="text-xl font-bold text-dark">Upload Assignment</h2>
            <button class="text-gray-400 hover:text-gray-600 transition cursor-pointer text-xl">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="px-6 pb-2 space-y-5">
            
            <div class="space-y-1.5">
                <label class="block text-sm font-semibold text-dark">Assignment Title</label>
                <input type="text" placeholder="Enter assignment title" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal transition-colors">
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-semibold text-dark">Description</label>
                <textarea rows="3" placeholder="Describe the assignment..." class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal transition-colors resize-none"></textarea>
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-semibold text-dark">Assignment PDF</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-8 flex flex-col items-center justify-center text-center hover:bg-gray-50 transition-colors cursor-pointer group">
                    
                    <div class="w-10 h-10 mb-3 text-gray-400 group-hover:text-teal transition-colors">
                        <i class="fas fa-cloud-upload-alt text-3xl"></i>
                    </div>
                    
                    <p class="text-sm text-gray-500 mb-1">Drag and drop or click to upload</p>
                    <p class="text-xs text-gray-400 mb-4">PDF files only</p>
                    
                    <button class="bg-white border border-gray-200 text-dark text-sm font-medium px-4 py-2 rounded-lg shadow-sm hover:bg-gray-50 transition cursor-pointer">
                        Browse Files
                    </button>
                </div>
            </div>
        </div>

        <div class="px-6 py-5 flex items-center justify-between gap-3 mt-2">
            <button class="flex-1 bg-white border border-gray-200 text-dark font-medium py-2.5 rounded-lg hover:bg-gray-50 transition cursor-pointer">
                Cancel
            </button>
            <button class="flex-1 bg-[#86c5be] text-white font-medium py-2.5 rounded-lg hover:bg-teal transition cursor-pointer shadow-sm">
                Publish
            </button>
        </div>

    </div>

</body>
</html>
