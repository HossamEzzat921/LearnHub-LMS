<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Content - Tailwind Version</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body class="bg-[#f8f7f4] text-gray-700 font-['Inter']">
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-96 bg-white border-r border-gray-300 overflow-y-auto sticky top-0 h-screen">
      <div class="p-6 border-b border-gray-300 sticky top-0 bg-white z-10">
        <a href="student-dashboard.html" class="inline-flex items-center gap-2 text-gray-600 text-sm mb-5 hover:text-teal-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 16 16">
            <path d="M10 12L6 8L10 4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back to Dashboard
        </a>

        <h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg text-gray-900 mb-4">Complete Web Development Bootcamp</h1>

        <!-- Progress -->
        <div>
          <div class="flex justify-between text-sm mb-1 text-gray-600">
            <span>Your progress</span>
            <span class="font-['Plus_Jakarta_Sans'] font-semibold text-teal-600">22%</span>
          </div>
          <div class="h-2 bg-gray-300 rounded-full">
            <div class="h-full bg-gradient-to-r from-teal-600 to-teal-800 rounded-full w-1/5 transition-all duration-700"></div>
          </div>
        </div>
      </div>

      <!-- Lessons -->
      <div>
        <!-- Section 1 -->
        <div class="border-b border-gray-300">
          <div class="flex items-center gap-3 p-5 cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
            <span class="text-gray-600">▸</span>
            <h2 class="font-['Inter'] font-semibold text-sm text-gray-900 flex-1">Getting Started with HTML</h2>
          </div>
          <div class="bg-white">
            <!-- Lesson Item -->
            <div class="flex items-center gap-3 p-4 pl-12 cursor-pointer bg-white/10 border-l-4 border-teal-600">
              <div class="w-8 h-8 rounded-md flex items-center justify-center bg-teal-600 text-white">
                <svg width="16" height="16" fill="white" viewBox="0 0 16 16">
                  <path d="M5 3.5v9l7-4.5-7-4.5z"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-['Inter'] font-medium text-sm text-teal-600 truncate">Introduction to Web Development</div>
                <div class="flex items-center gap-1 text-xs text-gray-600 mt-1">
                  <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="6" cy="6" r="5"/>
                    <path d="M6 3v3l2 1" stroke-linecap="round"/>
                  </svg>
                  15:00
                </div>
              </div>
            </div>

            <div class="flex items-center gap-3 p-4 pl-12 cursor-pointer hover:bg-gray-50 transition-colors">
              <div class="w-8 h-8 rounded-md flex items-center justify-center bg-green-500 text-white">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2">
                  <path d="M3 8l3 3 7-7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-['Inter'] font-medium text-sm text-gray-900 truncate">HTML Basics</div>
                <div class="flex items-center gap-1 text-xs text-gray-600 mt-1">
                  <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="6" cy="6" r="5"/>
                    <path d="M6 3v3l2 1" stroke-linecap="round"/>
                  </svg>
                  25:00
                </div>
              </div>
            </div>

            <div class="flex items-center gap-3 p-4 pl-12 cursor-not-allowed opacity-50">
              <div class="w-8 h-8 rounded-md flex items-center justify-center bg-gray-300 text-white">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M5 3.5v9l7-4.5-7-4.5z"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-['Inter'] font-medium text-sm text-gray-900 truncate">HTML Forms and Inputs</div>
                <div class="flex items-center gap-1 text-xs text-gray-600 mt-1">
                  <svg class="w-3 h-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="6" cy="6" r="5"/>
                    <path d="M6 3v3l2 1" stroke-linecap="round"/>
                  </svg>
                  30:00
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-[#f8f7f4]">

      <!-- Video Section -->
      <section class="relative">
        <div class="max-w-[1400px] mx-auto">
          <div class="relative aspect-video bg-gradient-to-br from-[#1a1d28] to-[#242937] flex items-center justify-center overflow-hidden">
            <div class="text-center text-white/90">
              <div class="relative w-24 h-24 rounded-full bg-white/10 border-2 border-teal-600/50 flex items-center justify-center mx-auto cursor-pointer hover:scale-105 transition-transform">
                <svg class="w-10 h-10 text-teal-600 ml-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polygon points="6 3 20 12 6 21 6 3"/>
                </svg>
              </div>
              <h2 class="font-['Plus_Jakarta_Sans'] text-2xl font-bold mb-1">Introduction to Web Development</h2>
              <p class="text-sm text-white/60">Click to play video</p>
            </div>
          </div>

          <div class="p-6 bg-white/10 backdrop-blur-sm rounded-md mt-4">
            <div class="mb-4">
              <div class="h-1.5 bg-white/20 rounded-full cursor-pointer relative hover:h-2 transition-all duration-200">
                <div class="h-full bg-gradient-to-r from-teal-600 to-teal-800 rounded-full w-1/3 relative">
                  <div class="absolute -right-1.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 bg-white rounded-full shadow-md opacity-0 hover:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <div class="flex justify-between text-xs text-black font-mono mt-1">
                <span>5:23 / 15:00</span>
                <span>15:00</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Navigation Buttons -->
      <div class="flex justify-center items-center gap-4 p-8 bg-white border-t border-gray-300 flex-wrap">
        <button class="flex items-center gap-2 px-7 py-3 rounded-xl font-['Inter'] font-semibold text-sm border border-gray-300 bg-[#f8f7f4] text-gray-700 hover:bg-gray-100 hover:border-gray-600 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 16 16">
            <path d="M10 12L6 8L10 4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Previous
        </button>

        <button class="flex items-center gap-2 px-8 py-3 rounded-xl font-['Inter'] font-semibold text-sm bg-green-500 text-white shadow-md hover:shadow-lg transition-shadow">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 18 18">
            <path d="M3 9l4 4 8-8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Mark as Complete
        </button>

        <button class="flex items-center gap-2 px-7 py-3 rounded-xl font-['Inter'] font-semibold text-sm bg-gradient-to-r from-teal-600 to-teal-800 text-white shadow-md hover:shadow-lg transition-shadow">
          Next
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 16 16">
            <path d="M6 4L10 8L6 12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </main>
  </div>
</body>

</html>
