<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnHub | Profile Settings</title>
  <link href="../css/style.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Navbar -->
  <nav class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between h-16">

      <!-- Left: Logo -->
      <div class=" overflow-hidden">
        <a href="/Client/index.html" class=" overflow-hidden">
          <img class="w-40 h-44 object-cover aspect-video relative"
            src="../assets/images/learnhub-logo-clean-removebg-preview.png" alt="Logo">
        </a>
      </div>

      <!-- Center: Links -->
      <div class="flex-1 flex justify-center gap-8 text-gray-600 font-medium">
        <a href="../pages/courses.html" class="hover:text-teal-600 transition">Courses</a>
        <a href="#" class="hover:text-teal-600 transition">Dashboard</a>
      </div>

      <!-- Right: User -->
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-700" id="usernameDisplay"></span>
        <a href="../pages/signIn.html" class="border px-3 py-1 rounded-md text-sm hover:bg-gray-100">
          Logout
        </a>
      </div>

    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-3xl mx-auto px-6 py-10">

    <h2 class="text-2xl font-bold mb-6">Profile Settings</h2>

    <!-- Profile Card -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">

      <!-- Header -->
      <div class="bg-teal-700 p-8 flex flex-col items-center text-white">

        <div class="relative">
          <img id="profileImage" src="" alt="Profile"
            class="w-24 h-24 rounded-full object-cover border-4 border-white" />
          <input type="file" id="imageInput" accept="image/*" class="hidden" />
          <button id="changeImageBtn" class="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow cursor-pointer">
            📷
          </button>
        </div>

        <h3 class="text-xl font-semibold mt-4" id="nameDisplay"> </h3>
        <span class="bg-teal-500 text-xs px-3 py-1 rounded-full mt-2">Student</span>
      </div>

      <!-- Form Section -->
      <div class="p-6 space-y-5">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium">First Name</label>
            <input type="text" id="firstName"
              class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>

          <div>
            <label class="text-sm font-medium">Last Name</label>
            <input type="text" id="lastName"
              class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium">Email Address</label>
          <input type="email" id="email"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
        </div>

        <!-- Account Type -->
        <div>
          <p class="text-sm font-medium mb-2">Account Type</p>
          <div class="border rounded-lg p-4 flex items-start gap-4 bg-gray-50">
            <div class="bg-teal-500 p-3 rounded-lg text-white">👨‍🎓</div>
            <div>
              <p class="font-medium">Student Account</p>
              <p class="text-sm text-gray-500">Access courses and track your learning progress</p>
            </div>
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3">
          <button id="saveBtn" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2 rounded-lg transition">
            Save Changes
          </button>
          <button id="cancelBtn" class="border px-6 py-2 rounded-lg hover:bg-gray-100">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="mt-8 border border-red-200 bg-red-50 rounded-lg p-6">
      <h4 class="text-red-600 font-semibold mb-2">Danger Zone</h4>
      <p class="text-sm text-gray-600 mb-4">
        Once you delete your account, there is no going back. Please be certain.
      </p>
      <button id="deleteBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">Delete Account</button>
    </div>

  </div>

  <script>
    // Load data from localStorage
    const firstNameInput = document.getElementById("firstName");
    const lastNameInput = document.getElementById("lastName");
    const emailInput = document.getElementById("email");
    const profileImage = document.getElementById("profileImage");
    const nameDisplay = document.getElementById("nameDisplay");
    const usernameDisplay = document.getElementById("usernameDisplay");

    function loadProfile() {
      const first = localStorage.getItem("firstName") || "";
      const last = localStorage.getItem("lastName") || "";
      const email = localStorage.getItem("email") || "hossamamer90002@gmail.com";
      const image = localStorage.getItem("profileImage") || "";

      firstNameInput.value = first;
      lastNameInput.value = last;
      emailInput.value = email;
      profileImage.src = image || "https://via.placeholder.com/150/00bcd4/ffffff?text=H";

      nameDisplay.textContent = first;
      usernameDisplay.textContent = first;
    }

    loadProfile();

    // Save changes
    document.getElementById("saveBtn").addEventListener("click", () => {
      localStorage.setItem("firstName", firstNameInput.value);
      localStorage.setItem("lastName", lastNameInput.value);
      localStorage.setItem("email", emailInput.value);
      alert("Profile saved!");
      loadProfile();
    });

    // Cancel button reloads saved data
    document.getElementById("cancelBtn").addEventListener("click", loadProfile);

    // Change profile image
    document.getElementById("changeImageBtn").addEventListener("click", () => {
      document.getElementById("imageInput").click();
    });

    document.getElementById("imageInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = () => {
          profileImage.src = reader.result;
          localStorage.setItem("profileImage", reader.result);
        };
        reader.readAsDataURL(file);
      }
    });

    // Delete account
    document.getElementById("deleteBtn").addEventListener("click", () => {
      if (confirm("Are you sure you want to delete your account?")) {
        localStorage.clear();
        alert("Account deleted!");
        loadProfile();
      }
    });
  </script>

</body>

</html>
